<body>

    <h1>Course Sign up page</h1>
    <p>Please Note: All text fields are required</p>

   <form action="Thank you.html" method="get">
    <label for="fn">First name:</label>
    <input type="text" name="" placeholder="First name" >

    <label for="ln">Last name:</label>
    <input type="text" name="" placeholder="Last name" >
    
    <p></p>

    <label for="mail">Email:</label>
    <input type="email" name="" placeholder="name@email.com" >

    <label for="pass">password:</label>
    <input type="password" name="" placeholder="********" >

    <p>Are you over the age of 18?</p>

    <label for="yes">Yes:</label>
    <input type="radio" name="loc">

    <label for="No">No:</label>
    <input type="radio" name="loc">

    <p>Do you have credit card or Phonepay?</p>

    <select name="option" id="">
        <option value="Credit card">Credit card</option>
        <option value="Phone pay">Phone pay</option>
    </select>

    <p></p>

    <input type="submit" value="Sign up">
    

   </form>
   
</body>
