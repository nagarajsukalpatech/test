<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tables</title>
</head>
<body>
    <table border="2">
        <thead>
           <th>Number</th> 
           <th>Colour</th>
           <th>Country</th>
        </thead>
        <tr>
            <td>250</td>
            <td>Orange</td>
            <td>India</td>
        </tr>
        <tr>
            <td>100</td>
            <td>Yellow</td>
            <td>Australia</td>
        </tr>
    </table>
</body>
</html>
